# Streamlit server config for running behind the Traefik reverse proxy.
[server]
headless = true
address = "0.0.0.0"
port = 8501
# Traefik terminates TLS and serves a single origin per subdomain,
# so CORS/XSRF browser-origin checks are unnecessary here.
enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false

[theme]
# Salary-bar blue as the app's primary colour (buttons, sliders, toggles, radios).
primaryColor = "#006AA7"

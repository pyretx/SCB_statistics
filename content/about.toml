# ── About Salary Explorer ────────────────────────────────────────────────────
[about]
eyebrow = "ABOUT"
title   = "About Salary Explorer"
[about.purpose]
heading = "What Salary Explorer is"
body    = "Salary Explorer is a free tool for looking up pay by occupation across countries, built entirely on official government statistics. It brings dozens of national statistical sources into one consistent interface so you can find and compare occupational earnings without hunting through each agency's data portal."
[about.data]
heading = "Built on official statistics"
body    = "Every country page draws on data published by that country's official statistics provider — national statistical offices, Eurostat, and equivalent bodies. We do not survey anyone or estimate our own wages; we surface what the official sources publish, and clearly mark anything Salary Explorer calculates on top (see Data sources & methodology)."
[about.enhanced]
heading = "More than a data portal"
body    = "On top of the official statistics, Salary Explorer adds a layer of enhanced analytics, features, tools and functions — occupation search and drill-down, multi-year trends, forward projections, gender comparisons, rankings, cross-country context and more — turning raw agency tables into something you can actually explore. This added layer gives the end-user considerably more value than the source data alone, and it is all packaged in a clean, user-friendly interface that works the same way in every country."
[about.coverage]
heading = "Coverage"
body    = "Coverage grows continuously. Countries are marked Live or Beta on the home page; Beta countries are newer additions still being validated. The Data sources & methodology page lists the exact dataset behind each country."
[about.methodology]
heading = "How it works"
body    = "Each country feeds a shared model through a data provider module: the source's figures are normalised into a common shape (occupation, period, currency) and rendered through the same charts and tables. Original source values are always preserved and labelled separately from any Salary Explorer calculation."
[about.limitations]
heading = "Limitations"
body    = "Occupational pay statistics differ between countries in survey method, reference period, coverage and classification. Salary Explorer aligns presentation, not underlying definitions — so figures are best read within a country, and cross-country comparisons treated as indicative. Official statistics can also be revised by the provider after publication."
[about.contact]
heading = "Contact"
body    = "Questions or corrections are welcome — get in touch via the Qvistin website."
[about.qvistin]
line     = "Salary Explorer is a Qvistin product."
link_url = "https://qvist.in"
link     = "Visit qvist.in ↗"


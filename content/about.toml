intro   = "Please read these points about how to interpret the figures in Salary Explorer."
items = [
  ["Independent product", "Salary Explorer is an independent Qvistin product. It is not affiliated with, endorsed by, or operated by any of the statistical providers whose data it displays."],
  ["No implied endorsement", "Reference to an official source does not imply that the source endorses Salary Explorer or its presentation of the data."],
  ["Official figures may be revised", "Statistics shown are as published by each provider at the time of retrieval. Providers may revise figures after publication; always consult the official source for the definitive value."],
  ["Derived values are ours", "Any conversion, aggregation, ranking, projection, reclassification or cross-country alignment is produced by Salary Explorer and labelled as such — it is not an official figure."],
  ["Comparability", "Figures for different countries come from different surveys with different methods, coverage and timing, and may not be directly comparable."],
  ["Not individual advice", "Salary Explorer provides general statistical information only. It does not provide individual salary, employment, legal or financial advice, and should not be relied on as such."],
]

[meta]
version = "2026-07-21"

[page]
eyebrow = "LEGAL"
title   = "Terms & Privacy Policy"
intro   = "The short version: Salary Explorer is a free tool built on official statistics. We collect the minimum needed to run accounts, we don't track you, and we never sell your data. The full terms and privacy policy are below."
updated = "Version {version}. If we make material changes we will announce them in the app; continued use after a change means you accept the updated terms."

# ── Terms of Service ─────────────────────────────────────────────────────────
[terms]
heading = "Terms of Service"
items = [
  ["Who we are", "Salary Explorer (salaryexplorer.qvist.in) is an independent product operated by Qvistin, Sweden (<a href='https://qvist.in' target='_blank'>qvist.in</a>). Questions about these terms or your data: email <a href='mailto:privacy@qvist.in'>privacy@qvist.in</a>."],
  ["The service", "Salary Explorer lets you browse occupational salary statistics published by official statistics providers. The service is currently in <b>beta</b>: features may change, be added or be removed, and availability is not guaranteed. Browsing core salary data is free and does not require an account; an account unlocks additional countries and features. The service is free while in beta - we may introduce paid plans for some features in the future, and will announce any such change in advance. Features that are free to browse today are intended to stay that way."],
  ["Your account", "You must be at least 16 years old to create an account. Provide accurate information, keep your password secure, and don't share your account. You are responsible for activity under your account. You can stop using the service at any time and request deletion of your account (see the Privacy Policy below)."],
  ["Acceptable use", "Don't misuse the service: no scraping or bulk downloading beyond normal personal use, no attempting to bypass access controls or role gates, no abusing the feedback form, and no unlawful use. We may suspend or close accounts that violate these terms."],
  ["Data, not advice", "All figures come from official statistics providers, and anything Salary Explorer calculates on top is labelled as such (see <a href='methodology' target='_blank'>Data sources & methodology</a>). The service provides general statistical information only - it is not salary, career, employment, legal or financial advice. Career-path salary ranges are statistical estimates, not guarantees. Providers may revise figures after publication; the official source is always definitive. See also <a href='disclaimers' target='_blank'>Disclaimers</a>."],
  ["Feedback", "If you send us feedback, bug reports or suggestions, we may use them to operate and improve the service without any obligation to you."],
  ["Third-party data", "The underlying statistics remain subject to each provider's own licence and attribution terms, listed per country on the <a href='methodology' target='_blank'>Data sources & methodology</a> page. Salary Explorer is not affiliated with or endorsed by any statistical provider."],
  ["No warranty & liability", "The service is provided \"as is\", without warranties of any kind, including accuracy, completeness or fitness for a particular purpose. To the extent permitted by law, Qvistin is not liable for decisions made, or losses incurred, in reliance on the service."],
  ["Changes & termination", "We may update these terms - the current version and date are always shown on this page, and material changes will be announced in the app. We may change or discontinue features, or discontinue the service, at any time during the beta."],
  ["Governing law", "These terms are governed by Swedish law."],
]

# ── Privacy Policy ───────────────────────────────────────────────────────────
[privacy]
heading = "Privacy Policy"
items = [
  ["Who is responsible", "Qvistin, Sweden (<a href='https://qvist.in' target='_blank'>qvist.in</a>) is the data controller for personal data processed by Salary Explorer. Contact <a href='mailto:privacy@qvist.in'>privacy@qvist.in</a> for any privacy request."],
  ["What we collect", "If you create an account: your name, email address and password. The password is handled by our authentication provider and stored only in securely hashed form - we never store it in plain text. We also store your account's access level (e.g. beta membership). If you submit feedback or a bug report, the report is stored together with your account id and email so we can follow up. Our servers keep standard technical logs (IP addresses, timestamps) for security and troubleshooting."],
  ["What we never do", "No advertising, no selling or sharing of personal data, no analytics or tracking cookies, no profiling. Browsing salary data requires no account and sends us no personal data beyond standard server logs."],
  ["Cookies", "Salary Explorer sets exactly one cookie: a strictly necessary session cookie that keeps you signed in. It expires when you close your browser. There are no tracking or third-party cookies, which is why you don't see a cookie banner."],
  ["Why we process it", "We process account data to provide the service you signed up for (contract), send transactional emails such as confirmation and password emails (contract), keep the service secure and prevent abuse (legitimate interest), and review feedback to fix bugs and improve the product (legitimate interest)."],
  ["AI-assisted processing", "Text you submit through the feedback form may be processed with AI tools (provided by Anthropic) to help us triage and reproduce reported issues. Please don't include passwords or confidential information in feedback - the form reminds you of this too."],
  ["Where your data lives", "Account data and feedback are stored with Supabase on Amazon Web Services in Dublin, Ireland (EU). The application itself runs on servers in Frankfurt, Germany (EU). Two providers process limited data outside the EU/EEA: Resend (United States) delivers our transactional emails and therefore processes your email address, and Anthropic (United States) may process feedback text as described above. Where data leaves the EU/EEA, transfers rely on recognised safeguards such as the EU standard contractual clauses."],
  ["How long we keep it", "Account data is kept until you delete your account. Feedback reports are kept while they remain relevant for product development. Server logs are kept briefly for security and troubleshooting and then discarded."],
  ["Your rights", "Under the GDPR you can request access to, correction of, or deletion of your personal data, ask for a copy in a portable format, and object to processing based on legitimate interest. Email <a href='mailto:privacy@qvist.in'>privacy@qvist.in</a> and we will respond without undue delay. You also have the right to complain to a supervisory authority - in Sweden, the Swedish Authority for Privacy Protection (<a href='https://www.imy.se' target='_blank'>IMY</a>) - or to the authority in your own country."],
  ["Deleting your account", "You can delete your account at any time from your profile: click your name in the top right, then Delete account. This permanently removes your account data. Feedback reports you have submitted are kept for product history but unlinked from your identity - if you want the report text removed as well, or prefer deletion by email, contact <a href='mailto:privacy@qvist.in'>privacy@qvist.in</a> from your registered address."],
  ["Children", "Salary Explorer is not directed at children. Accounts require a minimum age of 16."],
  ["Changes to this policy", "We will post any changes on this page and update the version above. If a change is material - for example a new category of data or a new provider - we will announce it in the app."],
]

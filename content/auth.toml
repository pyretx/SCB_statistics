# ─────────────────────────────────────────────────────────────────────────────
#  SIGN IN / CREATE ACCOUNT DIALOG  —  edit the text here.
# ─────────────────────────────────────────────────────────────────────────────

[dialog]
title = "Welcome to Salary Explorer"

# The decorative blue panel on the left of the dialog.
[panel]
eyebrow  = "SECURE ACCESS"
headline = "Official salary data,<br>always free to browse."   # <br> = line break
checks   = [
  "Explore Sweden & France right now - no account needed",
  "An account provides access to all live countries and is also required for beta users today",
  "Free while in beta",
]
footer   = "Official statistics only"

# The form on the right.
[form]
mode_sign_in    = "Sign in"          # segmented toggle labels
mode_create     = "Create account"
intro           = "Create a free account or explore without sign in. Browsing salary data never requires one - sign in required for admin access."
name_label      = "Full name"
name_ph         = "Jane Andersson"
email_label     = "Email"
email_ph        = "you@example.com"
password_label  = "Password"
password_ph     = "••••••••"
sign_in_button  = "Sign in"
create_button   = "Create account"
terms           = "By continuing you agree to the Terms and acknowledge the Privacy Policy."
close           = "Close"

# ─────────────────────────────────────────────────────────────────────────────
#  PROFILE DIALOG  —  opens when a signed-in user clicks their name (top right).
#  Read-only for now (no editing / password reset yet) + the beta-program ask.
# ─────────────────────────────────────────────────────────────────────────────
[profile]
title   = "Your profile"
f_name  = "Name"
f_email = "E-mail"
f_type  = "Account type"
no_name = "—"

type_master   = "Master"
type_admin    = "Admin"
type_beta     = "Beta"
type_standard = "Standard"

beta_heading = "Beta program"
beta_caption = "Beta members see new countries and features before everyone else."
beta_button  = "I would like to participate in the beta program"
beta_pending = "✅ Request sent {date} — an administrator will review it."
beta_member  = "You're in the beta program — beta features are enabled for your account."
beta_admin   = "Admin accounts already include every beta feature."
beta_failed  = "Could not send the request: {err}"
close        = "Close"

# Feedback messages. {err} is replaced with the underlying reason.
[messages]
confirmed      = "✅ Registration link opened — please sign in below. If sign-in says your email isn't confirmed, press “Resend confirmation email”."
sign_in_failed = "Sign-in failed: {err}"
resend_button  = "📧 Resend confirmation email"
resent         = "Confirmation email re-sent to {email} — open the newest email and click its link, then sign in."
resend_failed  = "Could not resend: {err}"
missing_fields = "Name, email and password are required."
create_failed  = "Could not create account: {err}"
check_inbox    = "Account created — check your inbox to confirm your email, then sign in. (Tip: if the link says it's expired or already used, come back here and press “Resend confirmation email” after a failed sign-in.)"

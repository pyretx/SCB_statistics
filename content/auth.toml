# ─────────────────────────────────────────────────────────────────────────────
#  SIGN IN / CREATE ACCOUNT DIALOG  —  edit the text here.
# ─────────────────────────────────────────────────────────────────────────────

[dialog]
title = "Welcome to Salary Explorer"

# The decorative blue panel on the left of the dialog.
[panel]
eyebrow  = "SECURE ACCESS"
headline = "Official salary data,<br>always free to browse."   # <br> = line break
checks   = [
  "Explore Sweden & France right now - no account needed",
  "An account provides access to all live countries and is also required for beta users today",
  "Free while in beta",
]
footer   = "Official statistics only"

# The form on the right.
[form]
mode_sign_in    = "Sign in"          # segmented toggle labels
mode_create     = "Create account"
intro           = "Create a free account or explore without sign in. Browsing salary data never requires one - sign in required for admin access."
name_label      = "Full name"
name_ph         = "Jane Andersson"
email_label     = "Email"
email_ph        = "you@example.com"
password_label  = "Password"
password_ph     = "••••••••"
sign_in_button  = "Sign in"
create_button   = "Create account"
terms           = "By continuing you agree to the Terms and acknowledge the Privacy Policy."
close           = "Close"

# Feedback messages. {err} is replaced with the underlying reason.
[messages]
confirmed      = "✅ Thanks for confirming your registration — please sign in below."
sign_in_failed = "Sign-in failed: {err}"
missing_fields = "Name, email and password are required."
create_failed  = "Could not create account: {err}"
check_inbox    = "Account created — check your inbox to confirm your email, then sign in."

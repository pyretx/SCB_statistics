# ─────────────────────────────────────────────────────────────────────────────
#  HOME PAGE CONTENT  —  edit the text here; no code changes needed.
#  Lines starting with #  are comments.  Text goes inside "quotes".
#  After editing, just refresh the page (rerun) to see it.
# ─────────────────────────────────────────────────────────────────────────────

[brand]
name    = "Salary Explorer"     # wordmark, top-left
badge   = "BETA"                # little pill next to the wordmark
tagline = "POWERED BY QVISTIN"  # small mono line under the wordmark (start page, sidebars, admin)

[header]                      # top-right controls
sign_in        = "Sign in"
create_account = "Create account"
log_out        = "Log out"
admin          = "Admin"                       # admin-only button → /admin panel (gear icon added in code)

[hero]
eyebrow = "OFFICIAL STATISTICS · GLOBAL"
title   = "Salary data from national agencies, made explorable."
intro   = "One clean interface over official government statistics - percentiles, breakdowns and trends, standardised and enhanced with analytics and functions, so you can compare occupations within and across countries."

# Hero KPI row. live/beta counts are computed from the [countries].catalog
# statuses; roadmap is the planned ("soon") count rounded to a "N+" figure. Only
# the labels, the static official-sources figure, and the punchline live here.
[hero.stats]
label_live     = "countries live"
label_beta     = "in beta"
label_roadmap  = "on the roadmap"
label_official = "official sources"
official       = "100%"

# The pitch-video button under the hero intro. `file` is repo-relative; the
# video opens in a pop-up and starts playing. Update `duration` if the video
# changes (shown as the little mono chip on the button).
[hero.video]
label    = "Watch the demo"
duration = "1:00"
file     = "assets/video/Salary Explorer low.mp4"

# The live-preview card (right of the hero). Each slide previews one occupation.
# occ_code/year: leave occ_code = "" to skip the live fetch and just show the
# fallback figures (used for the France slide). fallback = the numbers shown if
# the live fetch is unavailable.
[hero.preview]
eyebrow    = "LIVE PREVIEW"
foot_label = "Median gross salary"
per_month  = "/mo"

[[hero.preview.slides]]
title    = "Software developers"
sub      = "Sweden · SCB 2025 · monthly, SEK"
iso      = "se"
unit     = "kr"
occ_code = "2512"
year     = "2025"
fallback = { p10 = 39600, p25 = 46200, median = 53500, p75 = 62600, p90 = 72600 }

[[hero.preview.slides]]
title    = "Psychiatric nurses"
sub      = "France · INSEE 2023 · monthly, EUR"
iso      = "fr"
unit     = "€"
occ_code = ""
year     = ""
fallback = { p10 = 2070, p25 = 2470, median = 2950, p75 = 3280, p90 = 3830 }

[[hero.preview.slides]]
title    = "Mechanical engineers"
sub      = "Sweden · SCB 2025 · monthly, SEK"
iso      = "se"
unit     = "kr"
occ_code = "2144"
year     = "2025"
fallback = { p10 = 40200, p25 = 45300, median = 51800, p75 = 60000, p90 = 69900 }

# SSB 11418, STYRK-08 1212, private sector (the Norway page's default), 2025.
# SSB publishes quartiles only — the tile renders P25/MED/P75.
[[hero.preview.slides]]
title    = "Human resource managers"
sub      = "Norway · SSB 2025 · monthly, NOK"
iso      = "no"
unit     = "kr"
occ_code = ""
year     = ""
fallback = { p25 = 79830, median = 100000, p75 = 125250 }

# BLS OEWS May 2025, SOC 13-2051, North Carolina (bundled us_oews.json.gz).
[[hero.preview.slides]]
title    = "Financial and Investment Analysts"
sub      = "United States · North Carolina · BLS OEWS May 2025 · annual, USD"
iso      = "us"
unit     = "$"
occ_code = ""
year     = ""
per      = "/yr"
fallback = { p10 = 61670, p25 = 76510, median = 102390, p75 = 131440, p90 = 167250 }

[countries]
eyebrow     = "SELECT A COUNTRY"
heading     = "Where do you want to look?"
search_ph   = "Search {n} countries…"   # {n} = number of catalog entries
signin_note = "A free account is required to open the data."
signin_cta  = "Sign in →"
official    = "official"                # source word on live/beta rows
planned     = "planned"                 # source word on "soon" rows
soon_badge  = "Soon"
beta_badge  = "Beta"
live_fmt    = "{live} LIVE · {total}"   # region-header counter
region_all  = "All"
live_badge  = "Live"
locked_note = "Free account required — sign in to open."
beta_note   = "Beta — available to beta testers and admins."

# Region filter pills, in display order.
regions = [
  { key = "europe",   label = "Europe" },
  { key = "americas", label = "Americas" },
  { key = "apac",     label = "Asia-Pacific" },
  { key = "mea",      label = "Middle East & Africa" },
]


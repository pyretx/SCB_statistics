[data.us]
name        = "United States"
source      = "BLS OEWS"
type        = "bundled file"
desc        = "Bundled snapshot, re-downloadable from BLS special-requests files (national + state + national-industry)."

[data.norway]
name    = "Norway"
source  = "SSB"
type    = "live API + STYRK labels"
desc    = "Salaries fetched live from SSB table 11418 and disk-cached; the bundled bilingual STYRK labels give instant dropdowns."

[data.denmark]
name    = "Denmark"
source  = "DST"
type    = "live API + DISCO labels"
desc    = "Standardized monthly earnings fetched live from DST table LONS20 (published per hour, scaled to a standard month) and disk-cached; the bundled bilingual DISCO labels give instant dropdowns. Beta country."

[data.iceland]
name    = "Iceland"
source  = "Hagstofa"
type    = "live API + ISCO labels"
desc    = "Monthly earnings fetched live from Hagstofa table VIN02001 (thousand ISK, scaled to full ISK) and disk-cached; bundled bilingual ISCO labels give instant dropdowns. Beta country."

[data.finland]
name    = "Finland"
source  = "StatFin"
type    = "live API + ISCO labels"
desc    = "Structure-of-Earnings monthly figures fetched live from StatFin table 15au (annual snapshot; P10/median/P90) and disk-cached; bundled bilingual ISCO labels give instant dropdowns. Beta country."

[data.estonia]
name    = "Estonia"
source  = "Stat. Estonia"
type    = "live API + ISCO labels"
desc    = "Average earnings fetched live from Statistics Estonia table PA633 (4-yearly SES snapshot; 446 detailed ISCO occupations, average only) and disk-cached; bundled bilingual ISCO labels give instant dropdowns. Beta country."

[data.netherlands]
name    = "Netherlands"
source  = "CBS"
type    = "live API + BRC labels"
desc    = "Gross hourly wages fetched live from CBS table 85517NED (OData; BRC-2014 occupation hierarchy, P25/median/P75, 2013→) and disk-cached; the bundled BRC labels + code map give instant dropdowns. Beta country."

[data.uk]
name    = "United Kingdom"
source  = "ONS ASHE"
type    = "bundled file"
desc    = "Bundled snapshot parsed from the official ONS ASHE Table 14 workbooks (occupation by 4-digit SOC 2020). P10–P90 + mean + jobs by occupation × sex × year (2021–2024) + a CPIH real-terms series. Rebuild re-downloads the workbooks. Beta country."

[data.germany]
name    = "Germany"
source  = "Destatis"
type    = "bundled file"
desc    = "Bundled snapshot parsed from the public Destatis Verdiensterhebung report (table 62361-03; gross monthly mean + median by KldB 2010 occupation, ~1300 occupations). Rebuild re-downloads the report. Beta country."

[data.sweden]
name    = "Sweden"
source  = "SCB"
type    = "live API + stored codes & labels"
desc    = "Salaries fetched live from SCB; occupation codes + SSYK labels/translations are cached for fast, translated dropdowns."
btn_wp  = "⚙ Work permit rules"
extras_title = "Sweden (/sweden, framework) — features beyond the framework standard"
extras  = [
  "🛂 Work-permit check — Migrationsverket rules, salary floor, market position (country-specific extra tab)",
  "📖 SSYK descriptions & synonyms — shown in the code browser; synonyms searchable in the sidebar",
]

[data.france]
name      = "France"
source    = "INSEE"
type      = "live API + microdata + PCS labels"
desc      = "Mean-salary series fetched live from INSEE Melodi (2024 means); per-occupation percentiles come from the bundled FD_SALAAN microdata (year above), importable below when INSEE publishes a new vintage."
# Microdata import (country-specific): paste the INSEE parquet URL or upload
imp_caption    = "Import a new FD_SALAAN vintage: ① on insee.fr, find the newest “Description des emplois salariés — fichier détail” (search for FD_SALAAN), ② copy the .parquet file link — or download the file — and ③ paste the link or upload it below, then press Import. The file is ~100 MB; the import takes a few minutes."
imp_url_label  = "INSEE parquet URL"
imp_url_ph     = "https://www.insee.fr/fr/statistiques/fichier/…/FD_SALAAN_2024.parquet"
imp_file_label = "…or upload the downloaded .parquet"
imp_year_label = "Data year"
imp_btn        = "⬆ Import microdata"
imp_need_src   = "Paste an INSEE URL or upload the parquet file first."
imp_confirm    = "This replaces the bundled {cur} percentile estimates with {new}, computed from the file you provide. The current data is kept unless the new build validates successfully. To persist across redeploys, commit the regenerated pcs_microdata_percentiles.json."
btn_confirm    = "✅ Import now"
btn_cancel     = "Cancel"
imp_running    = "Importing microdata…"
imp_done       = "✅ Microdata imported: {year} · {occ} occupations ({censored} with a censored top band). Lives until the next redeploy — commit pcs_microdata_percentiles.json to make it permanent."
imp_failed     = "Import failed: {err}"
extras_title = "France (/france, framework) — features beyond the framework standard"
extras  = [
  "📈 Long-run trend 1996→ — constant-euro series per broad PCS group (real-only trend, no CPI overlay needed)",
  "👥 Population backdrop — the all-employee centile curve behind each salary-distribution chart",
  "🗺 Régional breakdown — mean by région at PCS-group level (occupation-level régional data is not published)",
  "🎂 Age bands — mean + headcount per age band from the annual Melodi dataset",
]


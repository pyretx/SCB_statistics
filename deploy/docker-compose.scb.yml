# SCB Salary Explorer — PRODUCTION
# Runs as its own container, opts into the EXISTING Traefik (root_default network).
# n8n's /root/docker-compose.yml is never touched by this file.
#
# Build context is the repo root (one level up from this deploy/ folder).
# Run from the deploy/ directory with the shared env file:
#   docker compose --env-file /root/.env -f docker-compose.scb.yml up -d --build

name: scb-prod

services:
  scb:
    build: ..
    image: scb-salaries:latest
    container_name: scb-prod
    restart: always
    # Supabase secrets live on the server only, never in git or the image.
    # Work-permit rules persist on the host so admin edits survive redeploys.
    volumes:
      - /root/scb-secrets.toml:/app/.streamlit/secrets.toml:ro
      - /root/scb-wp-rules.json:/app/wp_rules.json:rw
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.scb.rule=Host(`scb.${DOMAIN_NAME}`)"
      - "traefik.http.routers.scb.entrypoints=web,websecure"
      - "traefik.http.routers.scb.tls=true"
      - "traefik.http.routers.scb.tls.certresolver=mytlschallenge"
      - "traefik.http.services.scb.loadbalancer.server.port=8501"

networks:
  traefik:
    external: true
    name: root_default

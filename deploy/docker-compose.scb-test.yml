# SCB Salary Explorer — TEST / staging
# Same pattern as production, unique router/container names so Traefik keeps them apart.
# Deploy from a clone on the `test` branch:
#   git clone -b test https://github.com/pyretx/SCB_statistics.git /srv/scb-test
#   cd /srv/scb-test/deploy
#   docker compose --env-file /root/.env -f docker-compose.scb-test.yml up -d --build
# URL: https://scb-test.srv950186.hstgr.cloud

name: scb-test

services:
  scb:
    build: ..
    image: scb-salaries:test
    container_name: scb-test
    restart: always
    # Supabase secrets live on the server only, never in git or the image.
    # Work-permit rules persist on the host so admin edits survive redeploys.
    # Per-env files (isolation): prod/test/dev each mount their OWN /root/scb-<env>-*
    # so dev/test edits never touch prod. Seed them with deploy/migrate-env-isolation.sh.
    volumes:
      - /root/scb-test-secrets.toml:/app/.streamlit/secrets.toml:ro
      - /root/scb-test-wp-rules.json:/app/wp_rules.json:rw
      - /root/scb-test-ssyk-overrides.json:/app/ssyk_overrides.json:rw
      - /root/scb-test-app-settings.json:/app/app_settings.json:rw
      - /root/scb-test-guide.json:/app/guide.json:rw
      - /root/scb-test-update-checks.json:/app/update_checks.json:rw
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.scb-test.rule=Host(`scb-test.${DOMAIN_NAME}`)"
      - "traefik.http.routers.scb-test.entrypoints=web,websecure"
      - "traefik.http.routers.scb-test.tls=true"
      - "traefik.http.routers.scb-test.tls.certresolver=mytlschallenge"
      - "traefik.http.services.scb-test.loadbalancer.server.port=8501"

networks:
  traefik:
    external: true
    name: root_default

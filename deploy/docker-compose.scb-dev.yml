# SCB Salary Explorer — DEV
# Same pattern as production, unique router/container names so Traefik keeps them apart.
# Deploy from a clone on the `dev` branch:
#   git clone -b dev https://github.com/pyretx/SCB_statistics.git /srv/scb-dev
#   cd /srv/scb-dev/deploy
#   docker compose --env-file /root/.env -f docker-compose.scb-dev.yml up -d --build
# URL: https://dev.qvist.in
# (the old https://scb-dev.srv950186.hstgr.cloud now 301-redirects to prod)

name: scb-dev

services:
  scb:
    build: ..
    image: scb-salaries:dev
    container_name: scb-dev
    restart: always
    # Supabase secrets live on the server only, never in git or the image.
    # Work-permit rules persist on the host so admin edits survive redeploys.
    # Per-env files (isolation): prod/test/dev each mount their OWN /root/scb-<env>-*
    # so dev/test edits never touch prod. Seed them with deploy/migrate-env-isolation.sh.
    volumes:
      - /root/scb-dev-secrets.toml:/app/.streamlit/secrets.toml:ro
      - /root/scb-dev-wp-rules.json:/app/wp_rules.json:rw
      - /root/scb-dev-ssyk-overrides.json:/app/ssyk_overrides.json:rw
      - /root/scb-dev-app-settings.json:/app/app_settings.json:rw
      - /root/scb-dev-guide.json:/app/guide.json:rw
      - /root/scb-dev-update-checks.json:/app/update_checks.json:rw
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.scb-dev.rule=Host(`dev.qvist.in`)"
      - "traefik.http.routers.scb-dev.entrypoints=web,websecure"
      - "traefik.http.routers.scb-dev.tls=true"
      - "traefik.http.routers.scb-dev.tls.certresolver=mytlschallenge"
      - "traefik.http.services.scb-dev.loadbalancer.server.port=8501"
      # Early beta users got the Hostinger hostname before the real domain
      # existed. Permanently redirect it (path + query preserved) to prod.
      # The dev environment itself stays reachable on dev.qvist.in only.
      - "traefik.http.routers.scb-dev-moved.rule=Host(`scb-dev.${DOMAIN_NAME}`)"
      - "traefik.http.routers.scb-dev-moved.entrypoints=web,websecure"
      - "traefik.http.routers.scb-dev-moved.tls=true"
      - "traefik.http.routers.scb-dev-moved.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.scb-dev-moved.middlewares=scb-dev-moved-redirect"
      - "traefik.http.middlewares.scb-dev-moved-redirect.redirectregex.regex=^https?://[^/]+/(.*)"
      - "traefik.http.middlewares.scb-dev-moved-redirect.redirectregex.replacement=https://salaryexplorer.qvist.in/$${1}"
      - "traefik.http.middlewares.scb-dev-moved-redirect.redirectregex.permanent=true"

networks:
  traefik:
    external: true
    name: root_default
